services:
  db:
    image: postgres:15-alpine
    container_name: inspectre-db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 2bffaeae7a209b178854078631c5b136 
      POSTGRES_DB: inspectre
    ports:
      - "5432:5432"
    volumes:
      - ${INSPECTRE_DATA_DIR:-./data}/db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d inspectre"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  web:
    build: ./backend
    container_name: inspectre-web
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://admin:2bffaeae7a209b178854078631c5b136@db:5432/inspectre
      PROBE_API_URL: http://host.docker.internal:8666
      SECRET_KEY: d3689ad87d9ee61a507399d6224c5c1039d7eaddedc1eea2d80b92e68130b4c6
      # Shared secret authenticating backend -> probe API calls (must match the probe service)
      PROBE_API_SECRET: ${PROBE_API_SECRET:-c31106d3c582c5f6ea86edb5bd8c86037ec063e47eb319326ea6fd6e195fb195}
      # Comma-separated list of allowed frontend origins
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
    # Remove or comment this out if you are monitoring a remote Docker host via TCP
    # (configure docker_host in Settings → Docker to tcp://host:2375 instead).
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${INSPECTRE_DATA_DIR:-./data}/vuln/trivy:/root/.cache/trivy
      - ${INSPECTRE_DATA_DIR:-./data}/container-backups:/app/backups
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy

  probe:
    build: ./probe
    container_name: inspectre-probe
    network_mode: "host"
    privileged: true
    restart: always
    environment:
      DATABASE_URL: postgresql://admin:2bffaeae7a209b178854078631c5b136@localhost:5432/inspectre
      # IP_RANGE and INTERFACE are intentionally omitted — probe auto-detects from routing table.
      # Set them here only if auto-detection picks the wrong interface on your machine.
      # IP_RANGE: "192.168.0.0/24"
      # INTERFACE: "eth0"
      SCAN_INTERVAL: "60"
      NMAP_ARGS: "-sT -O --osscan-limit -T4"
      PROBE_API_PORT: "8666"
      PYTHONUNBUFFERED: "1"
      # Shared secret authenticating backend -> probe API calls (must match the web service)
      PROBE_API_SECRET: ${PROBE_API_SECRET:-c31106d3c582c5f6ea86edb5bd8c86037ec063e47eb319326ea6fd6e195fb195}
      # Prevent any host NMAP_OPTS from leaking in and creating a duplicate -p flag
      NMAP_OPTS: ""
      # ── DNS / Hostname resolution ──────────────────────────────────────────
      # LAN_DNS_SERVER is intentionally omitted — backend resolves from gateway if blank.
      # LAN_DNS_SERVER: "192.168.0.1"
    volumes:
      - ${INSPECTRE_DATA_DIR:-./data}/vuln/nuclei:/root/nuclei-templates
    cap_add:
      - NET_ADMIN
      - NET_RAW
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: inspectre-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - web
