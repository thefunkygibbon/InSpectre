services:
  db:
    image: postgres:15-alpine
    container_name: inspectre-db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123 # Change this!
      POSTGRES_DB: inspectre
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d inspectre"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  web:
    build: ./backend
    container_name: inspectre-web
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://admin:password123@db:5432/inspectre
      # Probe runs with network_mode:host so it binds directly to the host.
      # host.docker.internal resolves to the Docker host bridge IP automatically
      # on any Docker Engine >= 20.10 — no manual config required.
      PROBE_API_URL: http://host.docker.internal:8082
    extra_hosts:
      # Makes host.docker.internal resolve to the host's bridge gateway IP.
      # Works on Linux with Docker Engine >= 20.10 (released Oct 2020).
      # No changes to Docker config or the host network are needed.
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy

  probe:
    build: ./probe
    container_name: inspectre-probe
    network_mode: "host"
    privileged: true
    restart: always
    environment:
      DATABASE_URL: postgresql://admin:password123@localhost:5432/inspectre
      IP_RANGE: "192.168.0.0/24"
      INTERFACE: "eno1"
      SCAN_INTERVAL: "60"
      NMAP_ARGS: "-O --osscan-guess -sV --version-intensity 5 -T4"
      PROBE_API_PORT: "8082"
      PYTHONUNBUFFERED: "1"
      # ── DNS / Hostname resolution ──────────────────────────────────────────
      # Set this to your router/DNS server IP so the probe can resolve LAN
      # hostnames via PTR (reverse DNS) lookups.
      # Example: LAN_DNS_SERVER: "192.168.0.1"
      # Without this, the probe tries to auto-detect from /etc/resolv.conf and
      # the default gateway, but an explicit value is always more reliable.
      LAN_DNS_SERVER: "192.168.0.1"
    cap_add:
      - NET_ADMIN
      - NET_RAW
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: inspectre-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - web
