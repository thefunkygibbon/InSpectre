services:
  db:
    image: postgres:15-alpine
    container_name: inspectre-db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123 # Change this!
      POSTGRES_DB: inspectre
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d inspectre"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  web:
    build: ./backend
    container_name: inspectre-web
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://admin:password123@db:5432/inspectre
      # Probe runs with network_mode:host so it binds directly to the host.
      # From this bridge-network container we reach the host via host-gateway.
      PROBE_API_URL: http://host-gateway:8001
    extra_hosts:
      # Resolves 'host-gateway' to the Docker host's bridge IP (typically 172.17.0.1)
      # This lets the backend reach the probe's host-bound port 8001.
      - "host-gateway:host-gateway"
    depends_on:
      db:
        condition: service_healthy

  probe:
    build: ./probe
    container_name: inspectre-probe
    network_mode: "host"
    privileged: true
    restart: always
    environment:
      DATABASE_URL: postgresql://admin:password123@localhost:5432/inspectre
      IP_RANGE: "192.168.0.0/24"
      INTERFACE: "eno1"
      SCAN_INTERVAL: "60"
      NMAP_ARGS: "-O --osscan-guess -sV --version-intensity 5 -T4"
      PROBE_API_PORT: "8001"
      PYTHONUNBUFFERED: "1"
    cap_add:
      - NET_ADMIN
      - NET_RAW
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: inspectre-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - web
