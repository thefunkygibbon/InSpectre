name: Build & Push Containers

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-amd64:
    name: Build x64 images (latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push backend :latest
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          platforms: linux/amd64
          push: true
          tags: thefunkygibbon/inspectre-web:latest

      - name: Build & push probe :latest
        uses: docker/build-push-action@v5
        with:
          context: ./probe
          platforms: linux/amd64
          push: true
          tags: thefunkygibbon/inspectre-probe:latest

      - name: Build & push frontend :latest
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          platforms: linux/amd64
          push: true
          tags: thefunkygibbon/inspectre-frontend:latest

  build-arm64:
    name: Build ARM64 images (raspi)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push backend :raspi
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          platforms: linux/arm64
          push: true
          tags: thefunkygibbon/inspectre-web:raspi

      - name: Build & push probe :raspi
        uses: docker/build-push-action@v5
        with:
          context: ./probe
          platforms: linux/arm64
          push: true
          tags: thefunkygibbon/inspectre-probe:raspi

      - name: Build & push frontend :raspi
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          platforms: linux/arm64
          push: true
          tags: thefunkygibbon/inspectre-frontend:raspi