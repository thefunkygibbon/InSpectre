version: '3.8'

services:
  db:
    image: inspectre-postgres:arm64
    container_name: inspectre-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-inspectre}
      POSTGRES_USER: ${POSTGRES_USER:-inspectre}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-inspectre}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-inspectre} -d ${POSTGRES_DB:-inspectre}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  web:
    image: inspectre-backend:arm64
    container_name: inspectre-web
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-inspectre}:${POSTGRES_PASSWORD:-inspectre}@db:5432/${POSTGRES_DB:-inspectre}
      - SECRET_KEY=${SECRET_KEY:-your-secret-key}
      - PROBE_API_SECRET=${PROBE_API_SECRET:-c31106d3c582c5f6ea86edb5bd8c86037ec063e47eb319326ea6fd6e195fb195}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - PROBE_API_URL=http://host.docker.internal:8666
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data/vuln/trivy:/root/.cache/trivy
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: inspectre-frontend:arm64
    container_name: inspectre-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - web

  probe:
    image: inspectre-probe:arm64
    container_name: inspectre-probe
    restart: unless-stopped
    network_mode: "host"
    privileged: true
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-inspectre}:${POSTGRES_PASSWORD:-inspectre}@localhost:5432/${POSTGRES_DB:-inspectre}
      - SCAN_INTERVAL=${SCAN_INTERVAL:-60}
      - NMAP_ARGS=${NMAP_ARGS:--sT -O --osscan-limit -T4}
      - PROBE_API_PORT=${PROBE_API_PORT:-8666}
      - PYTHONUNBUFFERED=1
      - PROBE_API_SECRET=${PROBE_API_SECRET:-c31106d3c582c5f6ea86edb5bd8c86037ec063e47eb319326ea6fd6e195fb195}
      - NMAP_OPTS=
    volumes:
      - ./data/vuln/nuclei:/root/nuclei-templates
    cap_add:
      - NET_ADMIN
      - NET_RAW
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
