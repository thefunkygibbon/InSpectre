server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # -----------------------------------------------------------------------
    # Vuln-scan SSE stream — long-running nmap scans need extended timeouts
    # and buffering must be OFF so SSE lines reach the browser immediately.
    # This block must appear BEFORE the generic /api/ block so it takes
    # priority (nginx uses first-match for location blocks).
    #
    # proxy_pass with a trailing slash on a regex location doesn't strip the
    # prefix automatically, so we use rewrite to drop /api before passing.
    # -----------------------------------------------------------------------
    location ~* ^/api/devices/[^/]+/vuln-scan {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass             http://web:8000;
        proxy_http_version     1.1;
        proxy_set_header       Host $host;
        proxy_set_header       X-Real-IP $remote_addr;
        proxy_set_header       Connection '';

        # Allow up to 10 minutes for a slow nmap run
        proxy_read_timeout     600s;
        proxy_send_timeout     600s;
        proxy_connect_timeout  10s;

        # Disable ALL buffering so SSE lines are flushed immediately
        proxy_buffering        off;
        proxy_cache            off;
        proxy_request_buffering off;

        chunked_transfer_encoding on;
    }

    # -----------------------------------------------------------------------
    # Live update SSE stream — long-lived connection, buffering OFF so events
    # reach the browser immediately.  Must precede the generic /api/ block.
    # -----------------------------------------------------------------------
    location = /api/events/stream {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass             http://web:8000;
        proxy_http_version     1.1;
        proxy_set_header       Host $host;
        proxy_set_header       X-Real-IP $remote_addr;
        proxy_set_header       Connection '';

        # Keep the stream open for a long time; heartbeats every 15s.
        proxy_read_timeout     3600s;
        proxy_send_timeout     3600s;
        proxy_connect_timeout  10s;

        proxy_buffering        off;
        proxy_cache            off;
        proxy_request_buffering off;
        chunked_transfer_encoding on;
    }

    # -----------------------------------------------------------------------
    # Generic API proxy → FastAPI/uvicorn backend
    # -----------------------------------------------------------------------
    location /api/ {
        proxy_pass             http://web:8000/;
        proxy_http_version     1.1;
        proxy_set_header       Host $host;
        proxy_set_header       X-Real-IP $remote_addr;
        proxy_read_timeout     60s;
        proxy_send_timeout     60s;
    }

    # SPA fallback — all other routes served from built React app
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Service worker must never be cached so updates take effect immediately
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # Manifest served with short cache
    location = /manifest.json {
        add_header Cache-Control "max-age=3600";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript;
}
