server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # -----------------------------------------------------------------------
    # Vuln-scan SSE stream — long-running nmap scans need extended timeouts
    # and buffering must be OFF so SSE lines reach the browser immediately.
    # This block must appear BEFORE the generic /api/ block so it takes
    # priority (nginx uses first-match for location blocks).
    # -----------------------------------------------------------------------
    location ~* ^/api/devices/[^/]+/vuln-scan {
        proxy_pass             http://web:8000/devices/$1/vuln-scan$is_args$args;
        proxy_http_version     1.1;
        proxy_set_header       Host $host;
        proxy_set_header       X-Real-IP $remote_addr;
        proxy_set_header       Connection '';

        # Allow up to 10 minutes for a slow nmap run (adjust down if preferred)
        proxy_read_timeout     600s;
        proxy_send_timeout     600s;
        proxy_connect_timeout  10s;

        # Disable ALL buffering so SSE lines are flushed immediately
        proxy_buffering        off;
        proxy_cache            off;
        proxy_request_buffering off;

        # Tell nginx not to merge chunk headers
        chunked_transfer_encoding on;
    }

    # -----------------------------------------------------------------------
    # Generic API proxy → FastAPI/uvicorn backend
    # -----------------------------------------------------------------------
    location /api/ {
        proxy_pass             http://web:8000/;
        proxy_http_version     1.1;
        proxy_set_header       Host $host;
        proxy_set_header       X-Real-IP $remote_addr;
        proxy_read_timeout     60s;
        proxy_send_timeout     60s;
    }

    # SPA fallback — all other routes served from built React app
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript;
}
